<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Oregon Trail | Game</title>
    <link rel="stylesheet" href="../style.css">
    <script type="importmap">
    {
        "imports": {
            "terminal": "../scripts/terminal.js",
            "stats": "../scripts/stats.js",
            "players": "../scripts/players.js",
            "options": "../scripts/options.js"
        }
    }
    </script>
    <script type="module" src="../scripts/index.js"></script>
</head>
<body>
    <div class="game-container">
        <h1 class="game-title">The Oregon Trail</h1>
        <div class="game-hud-card">
            <div class="game-console">
                <pre class="game-console-text" id="console-text"></pre>
            </div>
            <div class="game-bottom-row-container">
                <div class="game-stats-container">
                    <p class="game-stat-text" id="happiness-text"></p>
                    <p class="game-stat-text" id="food-text"></p>
                    <p class="game-stat-text" id="money-text"></p>
                    <p class="game-stat-text" id="days-text"></p>
                </div>
                <div class="game-options-container">
                    <button class="game-options-button" id="option-button1"></button>
                    <button class="game-options-button" id="option-button2"></button>
                    <button class="game-options-button" id="option-button3"></button>
                    <button class="game-options-button" id="option-button4"></button>
                </div>
                <div class="game-player-list-container">
                    <p class="game-player-list-text" id="game-player-list-player-1"></p>
                    <p class="game-player-list-text" id="game-player-list-player-2"></p>
                    <p class="game-player-list-text" id="game-player-list-player-3"></p>
                    <p class="game-player-list-text" id="game-player-list-player-4"></p>
                </div>                
            </div>
        </div>
    </div>
</body>
</html>
